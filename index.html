<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coffee Master v8.3 - Sandbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; padding-bottom: 120px; zoom: 1.15; overflow-x: hidden; }
        .card { background: #161616; border-radius: 18px; padding: 14px; margin-bottom: 12px; border: 1px solid #262626; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .label-gold { color: #f59e0b; font-size: 9px; font-weight: 900; text-transform: uppercase; margin-top: 20px; margin-bottom: 4px; margin-left: 6px; letter-spacing: 1px; display: block; }
        .label-gold:first-child { margin-top: 0; }
        input, select, textarea { background: #222; border: 2px solid #333; color: #fff; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 4px; font-size: 16px; font-weight: 900; font-style: italic; -webkit-appearance: none; }
        .btn-gold { background: #f59e0b; color: #000; font-weight: 900; padding: 18px; border-radius: 18px; width: 100%; text-transform: uppercase; font-size: 14px; margin-top: 15px; cursor: pointer; }
        .tab-btn { background: #111; color: #444; flex: 1; padding: 14px 5px; border-radius: 14px; font-size: 10px; font-weight: 900; margin: 3px; border: 1px solid #222; }
        .active-tab { background: #f59e0b; color: #000; border-color: #fbbf24; }
        #auth-screen, #modal-feedback, #pix-modal, #modal-detalhes { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 2000; padding: 20px; display: flex; flex-direction: column; justify-content: center; overflow-y: auto; }
        .hidden { display: none !important; }
        .star { font-size: 28px; cursor: pointer; color: #333; }
        .star.active { color: #f59e0b; }
        .search-input { background: #000; border: 1px solid #333; font-size: 11px; padding: 10px; margin-bottom: 15px; border-radius: 10px; text-transform: uppercase; }
    </style>
</head>
<body class="p-3 max-w-lg mx-auto">

    <div id="modal-detalhes" class="hidden" onclick="fecharDetalhes()">
        <div class="card w-full max-w-sm mx-auto border-amber-500" onclick="event.stopPropagation()">
            <h3 class="text-amber-500 font-black italic uppercase text-xl mb-4">Ficha Técnica</h3>
            <div id="detalhes-content" class="space-y-3"></div>
            <button class="btn-gold w-full mt-6" onclick="fecharDetalhes()">VOLTAR</button>
        </div>
    </div>

    <div id="auth-screen">
        <div class="card w-full max-w-sm mx-auto border-amber-600">
            <h1 class="text-3xl font-black text-amber-500 italic uppercase text-center mb-8">COFFEE MASTER</h1>
            <div id="login-form">
                <span class="label-gold mt-0">E-mail</span><input type="email" id="login-email">
                <span class="label-gold">Senha</span><input type="password" id="login-pass">
                <button class="btn-gold w-full mt-6" onclick="handleLogin()">Entrar</button>
                <p class="text-[10px] text-center mt-6 font-black uppercase text-zinc-500">Novo por aqui? <button class="text-amber-500 underline" onclick="toggleAuth(false)">Criar agora</button></p>
            </div>
            <div id="signup-form" class="hidden">
                <span class="label-gold mt-0">Nickname</span><input type="text" id="sign-nick" placeholder="@NICKNAME">
                <span class="label-gold">E-mail</span><input type="email" id="sign-email">
                <span class="label-gold">Senha</span><input type="password" id="sign-pass">
                <span class="label-gold">Tipo de Perfil</span>
                <select id="sign-type" onchange="updateProfileInfo(this)"><option value="" disabled selected>SELECIONAR</option><option value="pessoal">PESSOAL (PRIVADO)</option><option value="comunidade">COMUNIDADE (PÚBLICO)</option></select>
                <div id="profile-info" class="text-[9px] font-bold text-amber-600 uppercase mt-2 italic px-2"></div>
                <button class="btn-gold w-full mt-6" onclick="handleSignup()">Criar Conta e Aceitar</button>
                <button class="text-[10px] w-full text-center mt-6 font-black uppercase text-zinc-500 underline" onclick="toggleAuth(true)">Já tenho conta</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <div class="flex justify-between items-center mb-5">
            <div><h1 class="text-2xl font-black text-amber-500 italic uppercase">COFFEE MASTER</h1><span id="user-display" class="text-[8px] font-black text-zinc-600 uppercase italic"></span></div>
            <button onclick="handleLogout()" class="bg-zinc-900 text-[9px] font-black p-2 rounded-lg border border-zinc-700 text-zinc-500 uppercase">Sair</button>
        </div>
        
        <div class="flex mb-6 bg-black p-1 rounded-2xl sticky top-2 z-50 border border-zinc-800 shadow-2xl">
            <button id="btn-cafes" class="tab-btn active-tab" onclick="showTab('cafes')">GRÃOS</button>
            <button id="btn-receitas" class="tab-btn" onclick="showTab('receitas')">RECEITAS</button>
            <button id="btn-preparo" class="tab-btn" onclick="showTab('preparo')">PREPARAR</button>
            <button id="btn-diario" class="tab-btn" onclick="showTab('diario')">DIÁRIO</button>
        </div>

        <div id="tab-cafes">
            <div class="card p-4">
                <span class="label-gold mt-0">Produtor</span><input type="text" id="g-prod">
                <span class="label-gold">Identificação do Grão</span><input type="text" id="g-nome">
                <span class="label-gold">Variedade</span><input type="text" id="g-variedade">
                <span class="label-gold">Processo</span><input type="text" id="g-processo">
                <span class="label-gold">Altitude</span><input type="text" id="g-altitude">
                <div class="flex gap-2">
                    <div class="flex-1"><span class="label-gold">Torra</span><select id="g-torra"><option value="" disabled selected>SELECIONAR</option><option>CLARA</option><option>MÉDIA-CLARA</option><option>MÉDIA</option><option>ESCURA</option></select></div>
                    <div class="flex-1"><span class="label-gold">DATA</span><input type="date" id="g-data"></div>
                </div>
                <span class="label-gold">Notas Sensoriais</span><textarea id="g-notas" rows="2"></textarea>
                <button class="btn-gold w-full" onclick="saveG()" id="g-btn-main">Salvar no Estoque</button>
            </div>
            <div id="list-g" class="space-y-3"></div>
        </div>

        <div id="tab-receitas" class="hidden">
            <div class="card p-4">
                <span class="label-gold mt-0">Nome da Receita</span><input type="text" id="r-nome">
                <span class="label-gold">Método</span><select id="r-metodo"><option>V60</option><option>AEROPRESS</option><option>KOAR</option></select>
                <div class="bg-zinc-900 p-3 rounded-xl border border-dashed border-zinc-700 mt-4">
                    <div class="grid grid-cols-3 gap-2">
                        <div><span class="label-gold mt-0">Ratio</span><input type="number" id="r-ratio-base" placeholder="15"></div>
                        <div><span class="label-gold mt-0">Pó Base</span><input type="number" id="r-po-base" placeholder="15"></div>
                        <div><span class="label-gold mt-0">Total</span><input type="number" id="r-total-base" readonly class="text-amber-500 font-bold border-amber-900"></div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2 mt-4">
                    <div><span class="label-gold">Bloom (ml)</span><input type="number" id="r-bloom-ml"></div>
                    <div><span class="label-gold">Tempo (s)</span><input type="number" id="r-bloom-sec"></div>
                </div>
                <div id="ataques-container" class="mt-2 space-y-1"></div>
                <button onclick="addAtackField()" class="text-[9px] font-black text-amber-500 mt-2 p-3 border border-dashed border-amber-900 w-full rounded-lg uppercase">+ ADICIONAR ATAQUE</button>
                <button class="btn-gold w-full mt-5" onclick="saveR()">Salvar Receita</button>
            </div>
            <div id="list-r" class="space-y-3"></div>
        </div>

        <div id="tab-preparo" class="hidden">
            <div class="card border-amber-600 bg-black p-5 text-center">
                <select id="p-g" onchange="upCalc()"></select><select id="p-r" onchange="handleRecipeSelect()"></select>
                <div class="grid grid-cols-2 gap-4 mt-4">
                    <div><span class="label-gold">Pó (g)</span><input type="text" id="p-po-val" value="--" onfocus="this.value=''; this.select()" oninput="upCalc()" class="text-center text-xl text-amber-500 font-black bg-transparent border-none"></div>
                    <div><span class="label-gold">Ratio</span><input type="text" id="p-ratio-val" value="--" onfocus="this.value=''; this.select()" oninput="upCalc()" class="text-center text-xl text-white font-black bg-transparent border-none"></div>
                </div>
                <div class="bg-zinc-900 rounded-2xl py-4 mt-6 border border-zinc-800">
                    <span class="text-[10px] font-black text-zinc-500 uppercase">Água Total</span>
                    <div class="text-4xl font-black text-white italic"><span id="p-total">0</span>ml</div>
                </div>
                <div id="timer" class="text-6xl font-black my-6 italic">00:00</div>
                <button onclick="toggleTimer()" id="btn-timer-main" class="bg-green-700 text-white font-black py-4 rounded-xl w-full uppercase">Iniciar</button>
            </div>
        </div>
        <div id="tab-diario" class="hidden"><div id="list-logs" class="space-y-3"></div></div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyCbIsrGjuu6KN-A0xpZUC6ID9aOHBEIJSE", authDomain: "coffee-master-e1f5c.firebaseapp.com", projectId: "coffee-master-e1f5c", storageBucket: "coffee-master-e1f5c.firebasestorage.app", messagingSenderId: "171441357303", appId: "1:171441357303:web:c85dc841ee73f6f29e2ef2" };
        firebase.initializeApp(config); const db = firebase.firestore(); const auth = firebase.auth();
        let currentUser = null, userProfile = null, timer = null, seg = 0, localData = { g: [], r: [] };

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                const p = await db.collection('users').doc(user.uid).get();
                userProfile = p.data();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-display').innerText = `@${userProfile.nick} (${userProfile.type})`;
                showTab('cafes');
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        // CÁLCULO AUTOMÁTICO DE ÁGUA NA RECEITA
        ['r-ratio-base', 'r-po-base'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                const r = parseFloat(document.getElementById('r-ratio-base').value) || 0;
                const p = parseFloat(document.getElementById('r-po-base').value) || 0;
                document.getElementById('r-total-base').value = Math.round(r * p);
            });
        });

        function abrirDetalhes(id) {
            const i = localData.g.find(x => x.id === id);
            if(!i) return;
            document.getElementById('detalhes-content').innerHTML = `
                <div class="text-[10px] uppercase font-black text-zinc-500">Produtor: <span class="text-white">${i.prod || '--'}</span></div>
                <div class="text-[10px] uppercase font-black text-zinc-500">Grão: <span class="text-white">${i.nome || '--'}</span></div>
                <div class="text-[10px] uppercase font-black text-zinc-500">Variedade: <span class="text-white">${i.variedade || '--'}</span></div>
                <div class="text-[10px] uppercase font-black text-zinc-500">Processo: <span class="text-white">${i.processo || '--'}</span></div>
                <div class="text-[10px] uppercase font-black text-zinc-500">Altitude: <span class="text-white">${i.altitude || '--'}</span></div>
                <div class="text-[10px] uppercase font-black text-zinc-500">Torra: <span class="text-amber-500">${i.torra || '--'}</span> (${i.data || '--'})</div>
                <div class="mt-4 p-3 bg-zinc-900 rounded-xl italic text-zinc-400 text-xs">"${i.notas || 'Sem notas'}"</div>
            `;
            document.getElementById('modal-detalhes').classList.remove('hidden');
        }
        function fecharDetalhes() { document.getElementById('modal-detalhes').classList.add('hidden'); }

        async function loadR() {
            let snap;
            if(userProfile.type === 'comunidade') snap = await db.collection('receitas').where('visibilidade', '==', 'publico').get();
            else snap = await db.collection('receitas').where('owner_uid', '==', currentUser.uid).get();
            
            localData.r = snap.docs.map(d => ({id: d.id, ...d.data()}));
            // BUSCA DADOS LEGADOS (SEM DONO)
            const legacy = await db.collection('receitas').get();
            legacy.forEach(d => { if(!d.data().owner_uid && !localData.r.find(x => x.id === d.id)) localData.r.push({id: d.id, ...d.data()}); });
            
            let h = '';
            localData.r.forEach(i => {
                const isMine = i.owner_uid === currentUser.uid || !i.owner_uid;
                h += `<div class="card p-3 flex justify-between items-center"><div class="flex-1"><div class="text-lg font-black italic uppercase text-amber-500">${i.nome}</div><div class="text-[8px] text-zinc-600 font-black uppercase">por @${i.owner_nick || 'Admin'} | ${i.metodo}</div></div><div class="flex gap-2"> ${isMine ? `<button class="p-2 bg-zinc-900 rounded-lg">✏️</button>` : ''} <button onclick="showTab('preparo'); handleRecipeSelect('${i.id}')" class="text-xs font-black p-2 bg-amber-600 text-black rounded-lg italic uppercase">Preparar</button> </div></div>`;
            });
            document.getElementById('list-r').innerHTML = h;
        }

        // --- FUNÇÕES BÁSICAS MANTIDAS ---
        function showTab(t){ ['cafes','receitas','preparo','diario'].forEach(i=>{ document.getElementById('tab-'+i).classList.toggle('hidden', i!==t); document.getElementById('btn-'+i).classList.toggle('active-tab', i===t); }); if(t==='cafes') loadG(); if(t==='receitas') loadR(); if(t==='preparo') loadPrep(); }
        async function loadG() { 
            let snap = await db.collection('cafes').get(); 
            localData.g = snap.docs.map(d => ({id: d.id, ...d.data()}));
            let h = ''; localData.g.forEach(i => {
                const isMine = i.owner_uid === currentUser.uid || !i.owner_uid;
                if(i.visibilidade === 'publico' || isMine) {
                    h += `<div class="card p-3 flex justify-between items-center border border-zinc-800"><div class="flex-1" onclick="abrirDetalhes('${i.id}')"><div class="text-[8px] text-zinc-600 font-black uppercase">${i.prod || '--'} • por @${i.owner_nick || 'Admin'}</div><div class="text-lg font-black italic uppercase text-white mt-1 leading-tight">${i.nome}</div><div class="text-[8px] text-amber-600 font-bold uppercase mt-1">${i.variedade || '--'} | ${i.processo || '--'}</div></div><div class="flex gap-2"> ${isMine ? `<button class="p-2 bg-zinc-900 rounded-lg">✏️</button>` : `<span class="text-[8px] font-black text-amber-900 border border-amber-900 p-2 rounded-xl uppercase">Lock</span>`} </div></div>`;
                }
            });
            document.getElementById('list-g').innerHTML = h;
        }
        async function saveG() { const d = { prod: document.getElementById('g-prod').value.toUpperCase(), nome: document.getElementById('g-nome').value.toUpperCase(), variedade: document.getElementById('g-variedade').value.toUpperCase(), processo: document.getElementById('g-processo').value.toUpperCase(), altitude: document.getElementById('g-altitude').value.toUpperCase(), torra: document.getElementById('g-torra').value, data: document.getElementById('g-data').value, notas: document.getElementById('g-notas').value.toUpperCase(), ts: firebase.firestore.FieldValue.serverTimestamp(), owner_uid: currentUser.uid, owner_nick: userProfile.nick, visibilidade: userProfile.type === 'pessoal' ? 'privado' : 'publico' }; await db.collection('cafes').add(d); loadG(); }
        async function saveR() { const d = { nome: document.getElementById('r-nome').value.toUpperCase(), metodo: document.getElementById('r-metodo').value, origRatio: parseFloat(document.getElementById('r-ratio-base').value), origPo: parseFloat(document.getElementById('r-po-base').value), origTotal: parseFloat(document.getElementById('r-total-base').value), bloomMl: parseFloat(document.getElementById('r-bloom-ml').value), bloomSec: parseFloat(document.getElementById('r-bloom-sec').value), ts: firebase.firestore.FieldValue.serverTimestamp(), owner_uid: currentUser.uid, owner_nick: userProfile.nick, visibilidade: userProfile.type === 'pessoal' ? 'privado' : 'publico' }; await db.collection('receitas').add(d); loadR(); }
        function handleLogout() { auth.signOut(); }
        function toggleAuth(l) { document.getElementById('login-form').classList.toggle('hidden', !l); document.getElementById('signup-form').classList.toggle('hidden', l); }
        async function handleLogin() { try { await auth.signInWithEmailAndPassword(document.getElementById('login-email').value, document.getElementById('login-pass').value); } catch(e) { alert(e.message); } }
        async function handleSignup() { const n = document.getElementById('sign-nick').value, t = document.getElementById('sign-type').value; try { const res = await auth.createUserWithEmailAndPassword(document.getElementById('sign-email').value, document.getElementById('sign-pass').value); await db.collection('users').doc(res.user.uid).set({ nick: n, type: t, uid: res.user.uid }); } catch(e) { alert(e.message); } }
        function updateProfileInfo(s) { const i = document.getElementById('profile-info'); i.innerText = s.value === 'pessoal' ? "🔒 PRIVADO: SÓ VOCÊ VÊ." : "🌎 PÚBLICO: TODOS VÊEM."; }
        function upCalc() { const r = parseFloat(document.getElementById('p-ratio-val').value)||0, p = parseFloat(document.getElementById('p-po-val').value)||0; document.getElementById('p-total').innerText = Math.round(r * p); }
        async function loadPrep() { const gc = await db.collection('cafes').get(); const rc = await db.collection('receitas').get(); let gh = '', rh = ''; gc.forEach(d => gh += `<option value="${d.id}">${d.data().nome}</option>`); rc.forEach(d => rh += `<option value="${d.id}" data-ratio="${d.data().origRatio}" data-po="${d.data().origPo}">${d.data().nome}</option>`); document.getElementById('p-g').innerHTML = gh; document.getElementById('p-r').innerHTML = rh; }
        function handleRecipeSelect() { const s = document.getElementById('p-r'); const o = s.options[s.selectedIndex]; document.getElementById('p-ratio-val').value = o.dataset.ratio; document.getElementById('p-po-val').value = o.dataset.po; upCalc(); }
        function toggleTimer() { if(timer) { clearInterval(timer); timer = null; } else { timer = setInterval(() => { seg++; document.getElementById('timer').innerText = `${Math.floor(seg/60).toString().padStart(2,'0')}:${(seg%60).toString().padStart(2,'0')}`; }, 1000); } }
        function addAtackField() { const c = document.getElementById('ataques-container'); c.insertAdjacentHTML('beforeend', `<div class="flex gap-2 atk-row"><input type="number" class="flex-1" placeholder="ML"><input type="number" class="flex-1" placeholder="SEC"></div>`); }
    </script>
</body>
</html>
